# Deploy Firestore rules and indexes when backend config changes.
# Repository secret required: FIREBASE_TOKEN (from `firebase login:ci`).

name: Deploy Firebase

on:
  push:
    branches: [main]
    paths:
      - "firestore.rules"
      - "firestore.indexes.json"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/firebase-deploy.yml"
  workflow_dispatch:

concurrency:
  group: firebase-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy Firestore
        run: npx firebase deploy --only firestore --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
